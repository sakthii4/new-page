<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Web Page</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
        }

        header{
            background-color: #0b5ed7;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav{
            background-color: #333;
            text-align: center;
            padding: 10px;
        }

        nav a{
            color: white;
            text-decoration: none;
            margin: 15px;
        }

        .content{
            width: 80%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        footer{
            background-color: #0b5ed7;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Simple Website</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<div class="content">
    <h2>Welcome</h2>
    <p>This is a simple webpage created using HTML and internal CSS.</p>

    <h3>Features</h3>
    <ul style="display:inline-block; text-align:left;">
        <li>Single HTML file</li>
        <li>Internal CSS</li>
        <li>Simple layout</li>
        <li>Easy to understand</li>
    </ul>
</div>

<footer>
    <p>&copy; 2026 My Website</p>
</footer>

</body>
</html>
